services:
  gateway:
    build: .
    ports:
      - "8081:8081"
    environment:
      - GATEWAY_CONFIG_PATH=/app/config.docker.yaml
    volumes:
      - ./config.docker.yaml:/app/config.docker.yaml:ro
    depends_on:
      - mock-a
      - mock-b

  mock-a:
    image: python:3-alpine
    command: ["python3", "-m", "http.server", "9001"]

  mock-b:
    image: python:3-alpine
    command: ["python3", "-m", "http.server", "9001"]
